name: Verify PR

on:
    pull_request:
        branches: [main]

jobs:
    verify-pr:
        timeout-minutes: 3
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
            - name: Install dependencies
              run: npm ci
            - name: Prettier
              run: npm run pretty:check
            - name: ESLint
              run: npm run lint
            - name: Check lib types
              run: npm run type-check
            - name: Build
              run: npm run build
            - name: Check test types
              run: npm run type-check:tests
            - name: Run tests
              run: npm run test
